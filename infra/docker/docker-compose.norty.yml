# ==============================================================================
# Norty Vision — stack de produção AUTOCONTIDO (Postgres/Redis/MinIO/API/Web
# PRÓPRIOS) atrás de Cloudflare Tunnel. Roda na MESMA VPS local do yugo sem
# colidir: nomes nv-*, redes norty-*, volumes norty-*, cloudflared próprio.
#
# NÃO publica 80/443 no host (regra da VPS local: só tunnel). O nv-caddy escuta
# HTTP :80 dentro da rede docker; o nv-cloudflared expõe pelo edge da Cloudflare.
#
# Uso na VPS (repo em /opt/norty-vision):
#   1) cd /opt/norty-vision/infra/docker
#      DOMAIN=vision.norty.com.br ../scripts/norty-generate-secrets.sh
#      # edite .env.norty: preencha CLOUDFLARED_TOKEN e NORTY_LICENSE_TOKEN
#   2) docker compose -f docker-compose.norty.yml --env-file .env.norty up -d \
#        nv-postgres nv-redis nv-minio nv-minio-init
#   3) bash ../scripts/norty-db-apply.sh          # cria DB norty_vision + schema
#   4) docker compose -f docker-compose.norty.yml --env-file .env.norty up -d --build
#   5) bash ../scripts/norty-create-master.sh     # cria o master (senha digitada)
# ==============================================================================

name: norty-vision

networks:
  norty-edge:
    name: norty-edge
  norty-internal:
    name: norty-internal
    internal: false

volumes:
  nv_caddy_data:    { name: norty-caddy-data }
  nv_caddy_config:  { name: norty-caddy-config }
  nv_postgres_data: { name: norty-postgres-data }
  nv_redis_data:    { name: norty-redis-data }
  nv_minio_data:    { name: norty-minio-data }

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-restart: &default-restart
  restart: unless-stopped

services:
  # ----------------------------------------------------------------------------
  # CADDY (tunnel mode: HTTP :80 interno, TLS no edge da CF)
  # ----------------------------------------------------------------------------
  nv-caddy:
    image: caddy:2.8-alpine
    container_name: nv-caddy
    <<: *default-restart
    logging: *default-logging
    expose:
      - "80"
    volumes:
      - ../caddy/Caddyfile.norty:/etc/caddy/Caddyfile:ro
      - ../caddy/maintenance:/srv/maintenance:ro
      - nv_caddy_data:/data
      - nv_caddy_config:/config
    environment:
      NORTY_BASE_DOMAIN: ${NORTY_BASE_DOMAIN:-vision.norty.com.br}
    networks:
      - norty-edge
      - norty-internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # ----------------------------------------------------------------------------
  # CLOUDFLARED (tunnel próprio do Norty Vision)
  # ----------------------------------------------------------------------------
  nv-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: nv-cloudflared
    <<: *default-restart
    logging: *default-logging
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${NORTY_CLOUDFLARED_TOKEN}
    networks:
      - norty-edge
    depends_on:
      nv-caddy:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # POSTGRES 16 (+ pgvector) — banco próprio norty_vision
  # ----------------------------------------------------------------------------
  nv-postgres:
    image: pgvector/pgvector:pg16
    container_name: nv-postgres
    <<: *default-restart
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
      PGTZ: America/Sao_Paulo
      TZ: America/Sao_Paulo
    volumes:
      - nv_postgres_data:/var/lib/postgresql/data
    networks:
      - norty-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    shm_size: 256mb
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1GB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - random_page_cost=1.1
      - -c
      - log_min_duration_statement=500
      - -c
      - timezone=America/Sao_Paulo

  # ----------------------------------------------------------------------------
  # REDIS 7
  # ----------------------------------------------------------------------------
  nv-redis:
    image: redis:7-alpine
    container_name: nv-redis
    <<: *default-restart
    logging: *default-logging
    networks:
      - norty-internal
    volumes:
      - nv_redis_data:/data
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ----------------------------------------------------------------------------
  # MINIO
  # ----------------------------------------------------------------------------
  nv-minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: nv-minio
    <<: *default-restart
    logging: *default-logging
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER: "off"
    networks:
      - norty-internal
    volumes:
      - nv_minio_data:/data
    command: server /data --address ":9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  nv-minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: nv-minio-init
    depends_on:
      nv-minio:
        condition: service_healthy
    networks:
      - norty-internal
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      sh -c "
      set -e;
      mc alias set local http://nv-minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      mc version enable local/$$MINIO_BUCKET || true;
      mc mb --ignore-existing local/norty-public;
      mc anonymous set download local/norty-public;
      echo 'buckets Norty prontos: '$$MINIO_BUCKET' (privado) + norty-public (read-only)';
      "
    restart: "no"

  # ----------------------------------------------------------------------------
  # API — NestJS (build da PRÓPRIA codebase do norty-vision)
  # ----------------------------------------------------------------------------
  nv-api:
    image: norty/api:latest
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: nv-api
    <<: *default-restart
    logging: *default-logging
    depends_on:
      nv-postgres:
        condition: service_healthy
      nv-redis:
        condition: service_healthy
    networks:
      - norty-internal
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      API_PORT: "3001"
      DATABASE_URL: "postgresql://yugo_app:${YUGO_APP_PASSWORD}@nv-postgres:5432/${POSTGRES_DB}?schema=public"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@nv-redis:6379"
      COOKIE_SECRET: ${AUTH_SECRET}
      SESSION_COOKIE_NAME: nv_session
      SESSION_COOKIE_DOMAIN: ${NORTY_BASE_DOMAIN}
      SESSION_DURATION_DAYS: "30"
      MASTER_COOKIE_NAME: nv_master
      CUSTOMER_COOKIE_NAME: nv_customer
      EMPLOYEE_COOKIE_NAME: nv_employee
      SUPPLIER_COOKIE_NAME: nv_supplier
      PLATFORM_ORG_SLUG: ${PLATFORM_ORG_SLUG:-norty-vision}
      DOMAIN: ${NORTY_BASE_DOMAIN}
      CORS_ORIGINS: "https://${NORTY_BASE_DOMAIN}"
      LOG_LEVEL: info
      # Norty Vision — identidade + API de licenciamento
      NORTY_SYSTEM_NAME: ${NORTY_SYSTEM_NAME:-Norty Vision}
      NORTY_LICENSE_TOKEN: ${NORTY_LICENSE_TOKEN}
      # MinIO
      MINIO_ENDPOINT: "http://nv-minio:9000"
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_PRIVATE: ${MINIO_BUCKET}
      MINIO_BUCKET_PUBLIC: norty-public
      MINIO_PUBLIC_BASE_URL: "https://${NORTY_BASE_DOMAIN}/storage"
      APP_PUBLIC_URL: "https://${NORTY_BASE_DOMAIN}"
      # SMTP (opcional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Norty Vision <no-reply@vision.norty.com.br>}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3001/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  # ----------------------------------------------------------------------------
  # WEB — Next.js standalone
  # ----------------------------------------------------------------------------
  nv-web:
    image: norty/web:latest
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_ROOT_DOMAIN: ${NORTY_BASE_DOMAIN:-vision.norty.com.br}
    container_name: nv-web
    <<: *default-restart
    logging: *default-logging
    networks:
      - norty-internal
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      API_INTERNAL_URL: "http://nv-api:3001"
      RUNBOOK_PASSWORD: "${RUNBOOK_PASSWORD:-}"
    depends_on:
      nv-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
