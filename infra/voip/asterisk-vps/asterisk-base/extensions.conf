; extensions.conf — dialplan do yugo.
;
; Contextos:
;  - internal: chamadas saindo dos ramais (operador → ramal interno OU PSTN).
;  - from-trunk: chamadas vindo do trunk SIP (sobreip → DID → grupo).
[globals]

[default]
; Catch-all (não deveria cair aqui em uso normal)
exten => _X.,1,Hangup()

[internal]
; ----- Ramal interno (1000-9999) -----
exten => _1XXX,1,NoOp(Interno: ${CALLERID(num)} → ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30,t)
 same => n,Hangup()

; ----- Conferência sala 9000 -----
exten => 9000,1,NoOp(Conferência ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,ConfBridge(sala9000)
 same => n,Hangup()

; ----- PSTN outbound (8+ dígitos) — vai pelo trunk -----
; Caller-ID sai do endpoint trunk (from_user definido no pjsip), não setamos aqui.
exten => _XXXXXXXX.,1,NoOp(PSTN out: ${CALLERID(num)} → ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@trunk,60,t)
 same => n,Hangup()

[from-trunk]
; ----- Inbound do DID (carrier disca pro nosso 7131800845) -----
; Por enquanto: toca o ramal 1001. Quando subirmos os grupos/IVR, isso vira
; dinâmico (consulta voip_did via AGI/dialplan).
exten => _X.,1,NoOp(Inbound DID: ${EXTEN} de ${CALLERID(all)})
 same => n,Answer()
 same => n,Dial(PJSIP/1001,30,t)
 same => n,Hangup()
