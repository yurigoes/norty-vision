; http.conf — habilita o HTTP server interno do Asterisk.
; res_http_websocket usa esse server pra expor /ws (SIP-over-WebSocket).
[general]
enabled = yes
bindaddr = 0.0.0.0
bindport = 8088
servername = yugo-asterisk
; Não habilitamos TLS aqui: o Caddy externo termina o TLS e proxia ws pro 8088.
tlsenable = no
