# coturn (TURN/STUN) — Fase B.2. Ajuste realm/credenciais e abra as portas no firewall.
listening-port=3478
tls-listening-port=5349
fingerprint
lt-cred-mech
# usuário estático p/ os ramais WebRTC (use o mesmo em VOIP_TURN_USER/PASS da API).
# Troque a senha! (combina com VOIP_TURN_PASS no .env.production)
user=yugo:TROQUE_ESTA_SENHA
realm=voip.yugochat.com.br
# faixa de mídia (libere no firewall UDP)
min-port=49152
max-port=65535
# segurança
no-cli
no-multicast-peers
# stale-nonce
# external-ip=SEU_IP_PUBLICO   # descomente e ponha o IP público se estiver atrás de NAT
