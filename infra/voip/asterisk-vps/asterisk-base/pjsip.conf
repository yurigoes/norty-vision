; pjsip.conf BASE — só os transports (estáticos).
; Os endpoints (ramais), auths, aors e trunks são gerados dinâmicos via
; sync-config.sh que escreve em pjsip_dynamic.conf (incluído abaixo).

[global]
type = global
; auth_username PRIMEIRO: quando o re-INVITE volta com Authorization Digest,
; PJSIP casa o endpoint pelo username do Digest (não pelo From). Sem isso,
; o re-INVITE com auth cai no anônimo e o Asterisk dropa silencioso → Timer B.
endpoint_identifier_order = auth_username,username,ip
default_from_user = yugochat
keep_alive_interval = 90

[system]
type = system
disable_tcp_switch = no

; ----- Transports -----

[transport-ws]
type = transport
protocol = ws
bind = 0.0.0.0:8088
; sem TLS aqui — o Caddy externo faz o WSS pra cliente
external_signaling_address = __PUBLIC_IP__
external_media_address = __PUBLIC_IP__

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060
external_signaling_address = __PUBLIC_IP__
external_media_address = __PUBLIC_IP__

[transport-tcp]
type = transport
protocol = tcp
bind = 0.0.0.0:5060
external_signaling_address = __PUBLIC_IP__
external_media_address = __PUBLIC_IP__

; ----- Inclui config dinâmica (endpoints/auths/aors + trunk) -----
#include pjsip_dynamic.conf
