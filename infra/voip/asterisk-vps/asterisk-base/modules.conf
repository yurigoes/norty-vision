; modules.conf — autoload TUDO e bloqueia o que sabe que dá problema/não usamos.
[modules]
autoload = yes

; Não usamos chan_sip (deprecated). chan_pjsip é o padrão moderno.
noload = chan_sip.so

; Não usamos H.323/IAX2/Skinny.
noload = chan_h323.so
noload = chan_iax2.so
noload = chan_skinny.so
noload = chan_mgcp.so

; ARI/AMI ficam off por enquanto (não usamos pra v1).
noload = res_ari.so
noload = res_ari_endpoints.so
noload = res_ari_channels.so
noload = res_ari_applications.so
noload = res_ari_asterisk.so
noload = res_ari_bridges.so
noload = res_ari_events.so
noload = res_ari_playbacks.so
noload = res_ari_recordings.so
noload = res_ari_sounds.so
noload = res_ari_device_states.so
noload = res_ari_mailboxes.so
