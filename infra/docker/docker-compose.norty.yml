# ==============================================================================
# Norty Vision — stack de produção AUTOCONTIDO (Postgres/Redis/MinIO/API/Web
# PRÓPRIOS) atrás de Cloudflare Tunnel. Roda na MESMA VPS local do yugo sem
# colidir: nomes nv-*, redes norty-*, volumes norty-*, cloudflared próprio.
#
# NÃO publica 80/443 no host (regra da VPS local: só tunnel). O nv-caddy escuta
# HTTP :80 dentro da rede docker; o nv-cloudflared expõe pelo edge da Cloudflare.
#
# Uso na VPS (repo em /opt/norty-vision):
#   1) cd /opt/norty-vision/infra/docker
#      DOMAIN=vision.norty.com.br ../scripts/norty-generate-secrets.sh
#      # edite .env.norty: preencha CLOUDFLARED_TOKEN e NORTY_LICENSE_TOKEN
#   2) docker compose -f docker-compose.norty.yml --env-file .env.norty up -d \
#        nv-postgres nv-redis nv-minio nv-minio-init
#   3) bash ../scripts/norty-db-apply.sh          # cria DB norty_vision + schema
#   4) docker compose -f docker-compose.norty.yml --env-file .env.norty up -d --build
#   5) bash ../scripts/norty-create-master.sh     # cria o master (senha digitada)
# ==============================================================================

name: norty-vision

networks:
  norty-edge:
    name: norty-edge
  norty-internal:
    name: norty-internal
    internal: false
  # Rede interna do yugo-platform — Postgres/Redis/MinIO COMPARTILHADOS (não duplicar).
  # Precisa já existir (o stack do yugo cria). nv-api/nv-caddy entram nela p/ falar
  # com os serviços `postgres` / `redis` / `minio` do yugo.
  yugo-internal:
    external: true
    name: yugo-internal

volumes:
  nv_caddy_data:    { name: norty-caddy-data }
  nv_caddy_config:  { name: norty-caddy-config }

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-restart: &default-restart
  restart: unless-stopped

services:
  # ----------------------------------------------------------------------------
  # CADDY (tunnel mode: HTTP :80 interno, TLS no edge da CF)
  # ----------------------------------------------------------------------------
  nv-caddy:
    image: caddy:2.8-alpine
    container_name: nv-caddy
    <<: *default-restart
    logging: *default-logging
    expose:
      - "80"
    volumes:
      - ../caddy/Caddyfile.norty:/etc/caddy/Caddyfile:ro
      - ../caddy/maintenance:/srv/maintenance:ro
      - nv_caddy_data:/data
      - nv_caddy_config:/config
    environment:
      NORTY_BASE_DOMAIN: ${NORTY_BASE_DOMAIN:-vision.norty.com.br}
    networks:
      - norty-edge
      - norty-internal
      - yugo-internal   # p/ proxyar /storage → minio compartilhado
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # ----------------------------------------------------------------------------
  # CLOUDFLARED (tunnel próprio do Norty Vision)
  # ----------------------------------------------------------------------------
  nv-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: nv-cloudflared
    <<: *default-restart
    logging: *default-logging
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${NORTY_CLOUDFLARED_TOKEN}
    networks:
      - norty-edge
    depends_on:
      nv-caddy:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # Postgres / Redis / MinIO: NÃO sobem aqui — são COMPARTILHADOS com o yugo
  # (serviços `postgres` / `redis` / `minio` na rede `yugo-internal`). O Norty
  # Vision usa um DATABASE separado (norty_vision), um índice de Redis separado
  # (/3) e buckets próprios no MinIO do yugo. Provisionamento: norty-share-yugo.sh
  # ----------------------------------------------------------------------------

  # ----------------------------------------------------------------------------
  # API — NestJS (build da PRÓPRIA codebase do norty-vision)
  # ----------------------------------------------------------------------------
  nv-api:
    image: norty/api:latest
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: nv-api
    <<: *default-restart
    logging: *default-logging
    networks:
      - norty-internal
      - yugo-internal   # p/ falar com postgres/redis/minio do yugo
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      API_PORT: "3001"
      # Postgres COMPARTILHADO (host `postgres` da rede yugo-internal), DB próprio
      DATABASE_URL: "postgresql://yugo_app:${YUGO_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      # Redis COMPARTILHADO, índice /3 (yugo usa 0-2)
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/3"
      COOKIE_SECRET: ${AUTH_SECRET}
      SESSION_COOKIE_NAME: nv_session
      # vazio = cookie HOST-ONLY (cada host gerencia sua sessão: apex master + <slug>.norty.com.br)
      SESSION_COOKIE_DOMAIN: ""
      SESSION_DURATION_DAYS: "30"
      MASTER_COOKIE_NAME: nv_master
      CUSTOMER_COOKIE_NAME: nv_customer
      EMPLOYEE_COOKIE_NAME: nv_employee
      SUPPLIER_COOKIE_NAME: nv_supplier
      PLATFORM_ORG_SLUG: ${PLATFORM_ORG_SLUG:-norty-vision}
      # root do esquema de slug (1 nível): empresas em <slug>.norty.com.br
      DOMAIN: ${NORTY_ROOT_DOMAIN:-norty.com.br}
      CORS_ORIGINS: "https://${NORTY_BASE_DOMAIN},https://${NORTY_ROOT_DOMAIN:-norty.com.br}"
      LOG_LEVEL: info
      # Norty Vision — identidade + API de licenciamento
      NORTY_SYSTEM_NAME: ${NORTY_SYSTEM_NAME:-Norty Vision}
      NORTY_LICENSE_TOKEN: ${NORTY_LICENSE_TOKEN}
      # MinIO COMPARTILHADO (host `minio` da rede yugo-internal), buckets próprios
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_PRIVATE: ${MINIO_BUCKET}
      MINIO_BUCKET_PUBLIC: norty-vision-public
      MINIO_PUBLIC_BASE_URL: "https://${NORTY_BASE_DOMAIN}/storage"
      APP_PUBLIC_URL: "https://${NORTY_BASE_DOMAIN}"
      # SMTP (opcional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Norty Vision <no-reply@vision.norty.com.br>}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3001/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  # ----------------------------------------------------------------------------
  # WEB — Next.js standalone
  # ----------------------------------------------------------------------------
  nv-web:
    image: norty/web:latest
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_ROOT_DOMAIN: ${NORTY_ROOT_DOMAIN:-norty.com.br}
    container_name: nv-web
    <<: *default-restart
    logging: *default-logging
    networks:
      - norty-internal
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      API_INTERNAL_URL: "http://nv-api:3001"
      RUNBOOK_PASSWORD: "${RUNBOOK_PASSWORD:-}"
    depends_on:
      nv-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
