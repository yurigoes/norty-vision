# ==============================================================================
# yugo-platform - producao
#
# Sobe: caddy (443/80) + postgres + redis + minio
# App (api/web/worker) vira em outro compose ou substitui o stub.
#
# Uso na VPS:
#   cd /srv/yugo
#   ./generate-secrets.sh           # gera .env.production
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml ps
# ==============================================================================

name: yugo-prod

networks:
  edge:
    name: yugo-edge
  internal:
    name: yugo-internal
    internal: false   # postgres/redis/minio falam com Caddy via rede interna

volumes:
  caddy_data:        { name: yugo-caddy-data }
  caddy_config:      { name: yugo-caddy-config }
  postgres_data:     { name: yugo-postgres-data }
  redis_data:        { name: yugo-redis-data }
  minio_data:        { name: yugo-minio-data }

# ------------------------------------------------------------------------------
# politica padrao de logs - aplica em todos via YAML anchor
# ------------------------------------------------------------------------------
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-restart: &default-restart
  restart: unless-stopped

services:
  # ----------------------------------------------------------------------------
  # CADDY - reverse proxy + TLS automatico (Let's Encrypt)
  # ----------------------------------------------------------------------------
  caddy:
    image: caddy:2.8-alpine
    container_name: yugo-caddy
    <<: *default-restart
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../caddy/maintenance:/srv/maintenance:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    networks:
      - edge
      - internal
    healthcheck:
      # 127.0.0.1 explicito pra evitar resolucao IPv6 (admin so escuta v4)
      test: ["CMD", "wget", "-qO-", "--tries=1", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # pra ouvir 80/443

  # ----------------------------------------------------------------------------
  # POSTGRES 16
  # ----------------------------------------------------------------------------
  postgres:
    # pgvector/pgvector:pg16 = postgres:16 (bookworm) + extensão pgvector.
    # Drop-in do postgres:16 (mesmo PGDATA/major), exigido pelo Chatwoot v4.
    image: pgvector/pgvector:pg16
    container_name: yugo-postgres
    <<: *default-restart
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
      PGTZ: America/Sao_Paulo
      TZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    # NAO expor porta publica; tudo via rede interna do compose.
    # Pra debugar local: docker exec -it yugo-postgres psql -U yugo -d yugo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    shm_size: 256mb
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1GB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - random_page_cost=1.1
      - -c
      - log_min_duration_statement=500    # log queries > 500ms
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
      - -c
      - log_line_prefix=%t [%p] %u@%d
      - -c
      - timezone=America/Sao_Paulo

  # ----------------------------------------------------------------------------
  # REDIS 7 - cache + filas BullMQ
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: yugo-redis
    <<: *default-restart
    logging: *default-logging
    networks:
      - internal
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --tcp-keepalive
      - "60"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ----------------------------------------------------------------------------
  # MINIO - storage S3-compatible
  # ----------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: yugo-minio
    <<: *default-restart
    logging: *default-logging
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER: "off"        # console fechado por seguranca
      # NOTA: MINIO_SERVER_URL nao aceita path; precisa ser host:port.
      # Como nao temos subdominio livre, MinIO fica interno por enquanto.
      # Para expor publicamente no futuro, opcoes:
      # - subdominio dedicado (minio.yugochat.com.br) em DNS
      # - proxy pela propria API (uploads via /api/upload)
    networks:
      - internal
    volumes:
      - minio_data:/data
    command: server /data --address ":9000"
    healthcheck:
      # endpoint HTTP padrao do MinIO; image traz curl em /usr/bin
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  # ----------------------------------------------------------------------------
  # API - NestJS (rota /api/* pelo Caddy)
  # ----------------------------------------------------------------------------
  api:
    image: yugo/api:latest
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: yugo-api
    <<: *default-restart
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      API_PORT: "3001"
      DATABASE_URL: "postgresql://yugo_app:${YUGO_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      COOKIE_SECRET: ${AUTH_SECRET}
      SESSION_COOKIE_NAME: yugo_session
      SESSION_COOKIE_DOMAIN: ${DOMAIN}
      SESSION_DURATION_DAYS: "30"
      CORS_ORIGINS: "https://${DOMAIN}"
      LOG_LEVEL: info
      # MinIO (cluster interno; credentials nao expostas fora da rede docker)
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_PRIVATE: ${MINIO_BUCKET}
      MINIO_BUCKET_PUBLIC: yugo-public
      MINIO_PUBLIC_BASE_URL: "https://${DOMAIN}/storage"
      APP_PUBLIC_URL: "https://${DOMAIN}"
      # SMTP (opcional - sem SMTP, reset de senha grava token mas nao envia email)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-yugochat <no-reply@yugochat.com.br>}
      # VoIP / Call center (todas opcionais — vazias desligam a feature correspondente)
      VOIP_SIP_WS_URL: ${VOIP_SIP_WS_URL:-}
      VOIP_SIP_DOMAIN: ${VOIP_SIP_DOMAIN:-}
      VOIP_FS_SECRET: ${VOIP_FS_SECRET:-}
      VOIP_TURN_HOST: ${VOIP_TURN_HOST:-}
      VOIP_TURN_USER: ${VOIP_TURN_USER:-}
      VOIP_TURN_PASS: ${VOIP_TURN_PASS:-}
      VOIP_TRUNK_NAME: ${VOIP_TRUNK_NAME:-}
      VOIP_TRUNK_KEY: ${VOIP_TRUNK_KEY:-}
      JITSI_BASE_URL: ${JITSI_BASE_URL:-}
      # Cloudflare TURN (P2P fallback)
      CLOUDFLARE_TURN_KEY_ID: ${CLOUDFLARE_TURN_KEY_ID:-}
      CLOUDFLARE_TURN_API_TOKEN: ${CLOUDFLARE_TURN_API_TOKEN:-}
      # Web Push (notificação de chamada em qualquer tela)
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:suporte@yugochat.com.br}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3001/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  # ----------------------------------------------------------------------------
  # WEB - Next.js standalone (servido como fallback pelo Caddy)
  # ----------------------------------------------------------------------------
  web:
    image: yugo/web:latest
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: yugo-web
    <<: *default-restart
    logging: *default-logging
    networks:
      - internal
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # URL interna do api - chamado por RSC do Next.js
      API_INTERNAL_URL: "http://api:3001"
      # senha da pagina Suporte -> Recuperacao & Backup (runbook), so master
      RUNBOOK_PASSWORD: "${RUNBOOK_PASSWORD:-}"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  # ----------------------------------------------------------------------------
  # MINIO BOOTSTRAP - cria bucket inicial uma vez e sai
  # ----------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: yugo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - internal
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      sh -c "
      set -e;
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      mc version enable local/$$MINIO_BUCKET || true;
      mc mb --ignore-existing local/yugo-public;
      mc anonymous set download local/yugo-public;
      echo 'buckets prontos: '$$MINIO_BUCKET' (privado) + yugo-public (read-only publico)';
      "
    restart: "no"
