<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>yugochat - em construcao</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0b;
      --fg: #f4f4f5;
      --muted: #8a8a92;
      --accent: #60a5fa;
      --border: #1f1f23;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-feature-settings: "cv11", "ss01";
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      max-width: 540px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
    }
    h1 {
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.15;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      margin-bottom: 12px;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
      animation: pulse 1.6s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.55);
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.55); }
      50%      { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
    }
    footer {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }
    code {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">yugochat</div>
    <h1>Estamos construindo algo novo.</h1>
    <p>
      <span class="dot" aria-hidden="true"></span>
      Servidor online. Aplicacao em deploy.
    </p>
    <p>Volte em breve.</p>
    <footer>
      Plataforma de agendamento, leads e disparador<br>
      <code>status: bootstrap</code>
    </footer>
  </main>
</body>
</html>
